rules:
  - id: CRED001
    severity: critical
    title: Hardcoded credential in node parameters
    description: >
      A node parameter contains a literal string that matches a known API key
      or secret pattern (e.g. OpenAI sk-, GitHub ghp_, AWS AKIA, Slack xoxb-).
      Hardcoded credentials expose secrets in workflow exports and version control.
    remediation: >
      Move the credential value into n8n's credential manager and reference it
      via a credential node. Never paste raw API keys into node parameter fields.
    references:
      - https://docs.n8n.io/credentials/

  - id: CRED002
    severity: info
    title: OAuth credential cannot be verified statically
    description: >
      A node references an OAuth credential. Static workflow JSON does not
      include live token state, so token expiry and validity cannot be confirmed
      from the file alone. When embedded token data is present and expired,
      severity is elevated to critical.
    remediation: >
      Reconnect the OAuth credential in n8n to refresh the token. Use
      analyse_instance for live expiry checks when n8n API access is available.

  - id: CRED003
    severity: high
    title: Credential referenced but not configured
    description: >
      A node's credential block lists a credential type with a missing or empty
      ID, indicating the credential was never set up in this n8n environment.
      The workflow will fail at runtime when this node executes.
    remediation: >
      Open the node in the n8n editor and configure the credential, or import
      and link the correct credential from the credential manager.

  - id: CRED004
    severity: medium
    title: Over-permissive Google OAuth credential scope
    description: >
      A Google service node (Sheets, Gmail, Calendar, Drive) is using the broad
      'googleApi' credential type instead of the narrower service-specific
      OAuth2 credential. The broad type grants access to all Google APIs the
      account is connected to, violating least-privilege.
    remediation: >
      Replace the 'googleApi' credential with the service-specific OAuth2
      credential (e.g. googleSheetsOAuth2Api for Google Sheets nodes).
